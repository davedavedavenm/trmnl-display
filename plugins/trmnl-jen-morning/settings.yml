name: Jen Morning
no_screen_padding: 'no'
dark_mode: 'no'
strategy: webhook
refresh_interval: 5
id: inkypi-jen-morning
custom_fields:
  - keyname: screen_label
    name: Screen Label
    field_type: string
    default: Jen Morning
    optional: true
    description: Optional small heading shown above the morning commute headline.
  - keyname: theme
    name: Theme
    field_type: select
    default: light
    options:
      - Light: light
      - Dark: dark
