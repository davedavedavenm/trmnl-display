name: Jen Morning
no_screen_padding: 'no'
dark_mode: 'no'
strategy: webhook
refresh_interval: 5
id: inkypi-jen-morning
custom_fields:
  - keyname: screen_label
    name: Screen Label
    field_type: string
    default: Jen Morning
    optional: true
    description: Optional small heading shown above the morning commute headline.
  - keyname: headline_fallback
    name: Headline Fallback
    field_type: string
    default: Time To Work
    optional: true
    description: Fallback headline used when the webhook payload does not provide one.
  - keyname: theme
    name: Theme
    field_type: select
    default: light
    options:
      - Light: light
      - Dark: dark
  - keyname: eta_label
    name: ETA Label
    field_type: string
    default: ETA
    optional: true
    description: Small label displayed above the ETA number.
  - keyname: eta_unit_label
    name: ETA Unit Label
    field_type: string
    default: Minutes
    optional: true
    description: Unit label shown beside or below the ETA value.
  - keyname: route_label
    name: Route Label
    field_type: string
    default: Route
    optional: true
    description: Small label displayed above the route name.
  - keyname: show_distance
    name: Show Distance
    field_type: boolean
    default: true
    optional: true
  - keyname: distance_unit_label
    name: Distance Unit
    field_type: string
    default: km
    optional: true
    description: Unit suffix displayed with the route distance.
