name: Jen Commute
no_screen_padding: 'no'
dark_mode: 'no'
strategy: webhook
refresh_interval: 2
id: inkypi-jen-commute
custom_fields:
  - keyname: screen_label
    name: Screen Label
    field_type: string
    default: Jen Commute
    optional: true
    description: Optional small heading shown above the main commute headline.
  - keyname: theme
    name: Theme
    field_type: select
    default: light
    options:
      - Light: light
      - Dark: dark
  - keyname: show_map_link
    name: Show Map Link
    field_type: boolean
    default: true
    optional: true
  - keyname: show_home_prep
    name: Show Home Prep
    field_type: boolean
    default: true
    optional: true
