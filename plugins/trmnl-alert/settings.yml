name: Alert
no_screen_padding: 'no'
dark_mode: 'yes'
strategy: webhook
refresh_interval: 1
id: inkypi-alert
custom_fields:
  - keyname: theme
    name: Theme
    field_type: select
    default: light
    options:
      - Light: light
      - Dark: dark
  - keyname: screen_label
    name: Screen Label
    field_type: string
    default: Alert
    optional: true
  - keyname: show_footer
    name: Show Footer
    field_type: boolean
    default: true
    optional: true
