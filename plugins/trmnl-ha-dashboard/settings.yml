name: HA Dashboard
description: A shareable TRMNL/LaraPaper Home Assistant dashboard with a Liquid compatibility template and optional indexed-colour sidecar renderer for Pimoroni Inky Impression Spectra panels.
author: David
version: 2.9.2
no_screen_padding: 'yes'
dark_mode: 'no'
strategy: webhook
refresh_interval: 10
id: trmnl-ha-dashboard
custom_fields:
  - keyname: dashboard_title
    field_type: text
    name: Dashboard Title
    default: "Home Assistant"
    placeholder: "Home Assistant"
  - keyname: instance_label
    field_type: text
    name: Instance Label
    default: "Home"
    placeholder: "Home"
  - keyname: layout_variant
    field_type: text
    name: Layout Variant
    default: "compact_grid"
    placeholder: "compact_grid"
  - keyname: colour_profile
    field_type: text
    name: Colour Profile
    default: "inky_spectra_7"
    placeholder: "inky_spectra_7"
  - keyname: ha_url
    field_type: text
    name: Home Assistant URL
    default: "http://homeassistant.local:8123"
    placeholder: "http://homeassistant.local:8123"
  - keyname: ha_token
    field_type: password
    name: Home Assistant Long-Lived Token
    default: ""
    placeholder: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
  - keyname: sonos_entities
    field_type: multi_string
    name: Sonos Media Players (comma-separated)
    default: ""
    placeholder: "media_player.living_room, media_player.kitchen"
  - keyname: light_entities
    field_type: multi_string
    name: Light Entities (comma-separated)
    default: ""
    placeholder: "light.living_room, light.bedroom, light.kitchen"
  - keyname: person_entities
    field_type: multi_string
    name: Person Entities (comma-separated)
    default: "person.example"
    placeholder: "person.alex, person.sam"
  - keyname: weather_entity
    field_type: text
    name: Weather Entity
    default: "weather.forecast_home"
    placeholder: "weather.forecast_home"
  - keyname: door_entity
    field_type: text
    name: Door Lock Entity
    default: ""
    placeholder: "binary_sensor.front_door_locked"
  - keyname: washer_entity
    field_type: text
    name: Washer Status Entity
    default: ""
    placeholder: "binary_sensor.washer_running"
  - keyname: blind_entity
    field_type: text
    name: Blinds Entity
    default: ""
    placeholder: "cover.living_room_blinds"
  - keyname: blind_open_position
    field_type: text
    name: Blind Open Position
    default: "100"
    placeholder: "100"
  - keyname: thermostat_entity
    field_type: text
    name: Thermostat Entity
    default: ""
    placeholder: "climate.thermostat"
  - keyname: energy_entity
    field_type: text
    name: Energy Entity
    default: ""
    placeholder: "sensor.daily_energy"
