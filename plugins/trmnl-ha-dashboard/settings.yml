name: HA Dashboard
no_screen_padding: 'no'
dark_mode: 'yes'
strategy: webhook
refresh_interval: 1
id: trmnl-ha-dashboard
custom_fields:
  - keyname: theme
    name: Theme
    field_type: select
    default: dark
    options:
      - Dark: dark
      - Light: light
    description: Choose a presentation theme for the dashboard.
  - keyname: show_inactive_sonos
    name: Show Inactive Sonos
    field_type: boolean
    default: false
    optional: true
    description: Show Sonos rooms that are idle, not just actively playing.
