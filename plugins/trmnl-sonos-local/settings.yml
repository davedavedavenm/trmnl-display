name: Sonos Local
no_screen_padding: 'no'
dark_mode: 'yes'
strategy: webhook
refresh_interval: 1
id: inkypi-sonos-local
custom_fields:
  - keyname: theme
    name: Theme
    field_type: select
    default: dark
    options:
      - Dark: dark
      - Light: light
    description: Choose a high-contrast presentation for the screen.
  - keyname: album_art_mode
    name: Album Art Mode
    field_type: select
    default: vivid
    options:
      - Vivid Color: vivid
      - Balanced Color: balanced
      - Raw Source: raw
      - Monochrome: mono
    description: Choose how album artwork is rendered on the 7-colour ACeP display.
  - keyname: preferred_room
    name: Preferred Room
    field_type: string
    optional: true
    description: Optional Sonos room name to pin instead of auto-selecting the active room.
  - keyname: show_album
    name: Show Album
    field_type: boolean
    default: true
    optional: true
    description: Show the album name under the artist.
  - keyname: show_album_art
    name: Show Album Art
    field_type: boolean
    default: true
    optional: true
    description: Show album artwork on the left side of the layout.
  - keyname: show_next_tracks
    name: Show Up Next
    field_type: boolean
    default: true
    optional: true
    description: Show the next few tracks from the local Sonos queue when available.
