input_button:
  trmnl_ha_dashboard_refresh:
    name: TRMNL HA Refresh Dashboard

rest_command:
  trmnl_ha_dashboard_refresh_sidecar:
    url: "http://192.168.1.143:8787/ha-dashboard/refresh"
    method: POST
    content_type: application/json
    headers:
      Authorization: !secret trmnl_mode_bridge_bearer
    payload: >
      {
        "source": "home_assistant",
        "reason": "{{ reason | default('state_change') }}"
      }

  trmnl_ha_dashboard_push:
    url: "http://192.168.1.143:4567/api/custom_plugins/4349fdad-a273-450b-aa00-3d32f2de788d"
    method: POST
    content_type: application/json
    payload: >
      {
        "merge_variables": {
          "dashboard_title": "Home Assistant",
          "instance_label": "Home",
          "layout_variant": "compact_grid",
          "colour_profile": "inky_spectra_7",
          "slots": {
            "top_left": {"type": "weather", "entity": "", "label": "", "detail_label": ""},
            "top_right": {"type": "indoor", "entity": "", "label": "", "detail_label": ""},
            "status_1": {"type": "door_lock", "entity": "", "label": "Front door", "detail_label": "Security"},
            "status_2": {"type": "cover", "entity": "", "label": "Blinds", "detail_label": "Position"},
            "status_3": {"type": "washer", "entity": "", "label": "Washer", "detail_label": "Utility"},
            "bottom_left": {"type": "person_group", "entity": "", "label": "People", "detail_label": ""},
            "bottom_right": {"type": "media", "entity": "", "label": "Media", "detail_label": "Sonos"}
          },
          "generic_entities": [],
          "updated_at": "{{ now().strftime('%d %b %H:%M') }}",
          "people": [
            {
              "name": "David",
              "state": "{{ states('person.david') }}"
            },
            {
              "name": "Jennifer",
              "state": "{{ states('person.jennifer') }}"
            }
          ],
          "weather": {
            "condition": "{{ states('weather.forecast_home') }}",
            "condition_label": "{{ states('weather.forecast_home') | replace('-', ' ') | title }}",
            "temperature": "{{ state_attr('weather.forecast_home', 'temperature') | default('', true) }}",
            "humidity": "{{ state_attr('weather.forecast_home', 'humidity') | default('', true) }}",
            "wind_speed": "{{ state_attr('weather.forecast_home', 'wind_speed') | default('', true) }}"
          },
          "sonos": [
            {% set players = expand('media_player.living_room', 'media_player.bedroom', 'media_player.kitchen', 'media_player.gym', 'media_player.sonos_roam') | selectattr('state', 'in', ['playing', 'paused', 'idle']) | list %}
            {% for player in players %}
            {
              "room": "{{ state_attr(player.entity_id, 'friendly_name') }}",
              "state": "{{ player.state }}",
              "title": "{{ state_attr(player.entity_id, 'media_title') | default('', true) }}",
              "artist": "{{ state_attr(player.entity_id, 'media_artist') | default('', true) }}",
              {% set pic = state_attr(player.entity_id, 'entity_picture') | default('', true) %}
              "picture": "{% if pic.startswith('/') %}http://192.168.1.89:8123{{ pic }}{% else %}{{ pic }}{% endif %}"
            }{% if not loop.last %},{% endif %}
            {% endfor %}
          ],
          "home": {
            "door_locked": {{ is_state('binary_sensor.nuki_flat_door_locked', 'off') | tojson }},
            "washer_running": {{ is_state('binary_sensor.wash_dryer_status', 'on') | tojson }},
            "blind_position": "{{ state_attr('cover.blinds_controller_curtain', 'current_position') | default('unavailable', true) }}",
            "blinds_open": {{ (state_attr('cover.blinds_controller_curtain', 'current_position') | int(100) == 0) | tojson }},
            "thermostat_temp": "{{ state_attr('climate.thermostat', 'current_temperature') | default('', true) }}"
          }
        }
      }

automation:
  - id: trmnl_ha_dashboard_refresh_button_v1
    alias: TRMNL HA Dashboard Refresh Button
    description: Lets the Home Assistant helper UI request a playlist-safe colour sidecar refresh.
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.trmnl_ha_dashboard_refresh
    action:
      - service: rest_command.trmnl_ha_dashboard_refresh_sidecar
        data:
          reason: helper_button

  - id: trmnl_ha_dashboard_helper_change_refresh_v1
    alias: TRMNL HA Dashboard Refresh On Helper Change
    description: Requests the playlist-safe colour sidecar refresh when dashboard slot helper settings change.
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_select.trmnl_ha_dashboard_top_left_card_type
          - input_select.trmnl_ha_dashboard_top_right_card_type
          - input_select.trmnl_ha_dashboard_status_1_card_type
          - input_select.trmnl_ha_dashboard_status_2_card_type
          - input_select.trmnl_ha_dashboard_status_3_card_type
          - input_select.trmnl_ha_dashboard_bottom_left_card_type
          - input_select.trmnl_ha_dashboard_bottom_right_card_type
          - input_text.trmnl_ha_dashboard_generic_entities
          - input_text.trmnl_ha_dashboard_generic_labels
          - input_text.trmnl_ha_dashboard_generic_icons
          - input_text.trmnl_ha_dashboard_generic_status_colours
          - input_text.trmnl_ha_dashboard_top_left_entity
          - input_text.trmnl_ha_dashboard_top_left_label
          - input_text.trmnl_ha_dashboard_top_left_detail_label
          - input_text.trmnl_ha_dashboard_top_right_entity
          - input_text.trmnl_ha_dashboard_top_right_label
          - input_text.trmnl_ha_dashboard_top_right_detail_label
          - input_text.trmnl_ha_dashboard_status_1_entity
          - input_text.trmnl_ha_dashboard_status_1_label
          - input_text.trmnl_ha_dashboard_status_1_detail_label
          - input_text.trmnl_ha_dashboard_status_2_entity
          - input_text.trmnl_ha_dashboard_status_2_label
          - input_text.trmnl_ha_dashboard_status_2_detail_label
          - input_text.trmnl_ha_dashboard_status_3_entity
          - input_text.trmnl_ha_dashboard_status_3_label
          - input_text.trmnl_ha_dashboard_status_3_detail_label
          - input_text.trmnl_ha_dashboard_bottom_left_entity
          - input_text.trmnl_ha_dashboard_bottom_left_label
          - input_text.trmnl_ha_dashboard_bottom_left_detail_label
          - input_text.trmnl_ha_dashboard_bottom_right_entity
          - input_text.trmnl_ha_dashboard_bottom_right_label
          - input_text.trmnl_ha_dashboard_bottom_right_detail_label
    action:
      - service: rest_command.trmnl_ha_dashboard_refresh_sidecar
        data:
          reason: helper_changed

  - id: trmnl_ha_dashboard_push_v1
    alias: TRMNL HA Dashboard Sidecar Refresh
    description: Requests the playlist-safe colour sidecar refresh on state changes or time interval.
    mode: restart
    trigger:
      - platform: time_pattern
        minutes: "/10"
      - platform: state
        entity_id:
          - person.david
          - person.jennifer
          - weather.forecast_home
          - binary_sensor.nuki_flat_door_locked
          - binary_sensor.wash_dryer_status
          - cover.blinds_controller_curtain
          - climate.thermostat
          - media_player.living_room
          - media_player.bedroom
          - media_player.kitchen
          - media_player.gym
          - media_player.sonos_roam
    action:
      - service: rest_command.trmnl_ha_dashboard_refresh_sidecar
        data:
          reason: scheduled_or_state_change
      - service: system_log.write
        data:
          level: info
          message: "TRMNL HA Dashboard sidecar refresh requested."

  - id: trmnl_ha_dashboard_media_refresh_sidecar_v1
    alias: TRMNL HA Dashboard Refresh Sidecar On Media
    description: Requests the playlist-safe colour sidecar refresh endpoint when Sonos playback metadata changes.
    mode: single
    trigger:
      - platform: state
        entity_id:
          - media_player.living_room
          - media_player.bedroom
          - media_player.kitchen
          - media_player.gym
          - media_player.sonos_roam
      - platform: state
        entity_id:
          - media_player.living_room
          - media_player.bedroom
          - media_player.kitchen
          - media_player.gym
          - media_player.sonos_roam
        attribute: media_title
      - platform: state
        entity_id:
          - media_player.living_room
          - media_player.bedroom
          - media_player.kitchen
          - media_player.gym
          - media_player.sonos_roam
        attribute: media_artist
    action:
      - service: rest_command.trmnl_ha_dashboard_refresh_sidecar
        data:
          reason: media_changed
      - service: system_log.write
        data:
          level: info
          message: "TRMNL HA Dashboard sidecar refresh requested for media change."
